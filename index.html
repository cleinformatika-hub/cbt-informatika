<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Informatika SMP - CBT Pro</title>
<style>
body{font-family:'Segoe UI';margin:0;background:#eef2f7}
header{background:linear-gradient(135deg,#1abc9c,#3498db);color:#fff;padding:20px;text-align:center}
.container{max-width:900px;margin:auto;padding:15px}
.card{background:#fff;border-radius:12px;padding:15px;margin-bottom:15px}
input,select{width:100%;padding:10px;margin:5px 0}
button{padding:10px;border:none;border-radius:8px;background:#3498db;color:#fff}
</style>
</head>
<body>

<header>
<h1>🔒 CBT Informatika SMP</h1>
<p>Sistem Ujian Digital</p>
</header>

<div class="container">

<div class="card">
<h3>Login</h3>
<input id="nama" placeholder="Nama">
<input id="kelas" placeholder="Kelas">
<input id="kode" placeholder="Kode Akses Hari Ini">
<select id="bab">
<option value="dasar">Bab Dasar</option>
<option value="internet">Bab Internet</option>
</select>
<button onclick="login()">Mulai Ujian</button>
<p id="status"></p>
</div>

<div class="card">
<h3>⏱️ Waktu: <span id="timer">0</span></h3>
<p id="question"></p>
<div id="options"></div>
<p id="result"></p>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyALiyuf_F6wXjt3zhqWWEcG_mlgZrqsFvE",
  authDomain: "informatika-smp-67234.firebaseapp.com",
  projectId: "informatika-smp-67234",
  storageBucket: "informatika-smp-67234.firebasestorage.app",
  messagingSenderId: "379885055714",
  appId: "1:379885055714:web:58432e6752f6a3fddcf8bb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let questions=[],current=0,score=0;
let currentUser="",currentClass="";
let time=120, interval;

// 🔒 KODE HARIAN
function getDailyCode(){
  const d = new Date();
  return "K" + d.getDate() + (d.getMonth()+1);
}

// 🔐 LOGIN
window.login = async ()=>{
  const snap = await getDocs(collection(db,"students"));
  let found=false;

  snap.forEach(doc=>{
    const s=doc.data();
    if(s.nama===nama.value && s.kelas===kelas.value && kode.value===getDailyCode()){
      found=true;
    }
  });

  if(found){
    currentUser=nama.value;
    currentClass=kelas.value;
    status.innerText="Login berhasil";
    enterFullscreen();
    startQuiz();
  } else {
    status.innerText="Akses ditolak (kode salah)";
  }
}

// 📱 FULLSCREEN
function enterFullscreen(){
  if(document.documentElement.requestFullscreen){
    document.documentElement.requestFullscreen();
  }
}

// 🎲 LOAD + FILTER + RANDOM + LIMIT
async function startQuiz(){
  const snap = await getDocs(collection(db,"questions"));
  questions=[];

  snap.forEach(doc=>{
    const q=doc.data();
    if(q.bab===bab.value) questions.push(q);
  });

  // shuffle
  questions.sort(()=>Math.random()-0.5);

  // limit 5 soal
  questions = questions.slice(0,5);

  current=0; score=0;
  startTimer();
  showQuestion();
}

// ⏱️ TIMER
function startTimer(){
  time=120;
  timer.innerText=time;
  interval=setInterval(()=>{
    time--;
    timer.innerText=time;
    if(time<=0){
      clearInterval(interval);
      finishQuiz();
    }
  },1000);
}

function showQuestion(){
  if(current>=questions.length){
    finishQuiz();
    return;
  }

  const q=questions[current];
  question.innerText=q.q;
  options.innerHTML="";

  q.options.forEach((opt,i)=>{
    const btn=document.createElement("button");
    btn.innerText=opt;
    btn.onclick=()=>answer(i);
    options.appendChild(btn);
  });
}

function answer(i){
  if(i===questions[current].answer) score++;
  current++;
  showQuestion();
}

function finishQuiz(){
  clearInterval(interval);
  question.innerText="Selesai";
  options.innerHTML="";
  result.innerText="Nilai: "+score;
  saveScore();
}

// 💾 SIMPAN NILAI
async function saveScore(){
  const id=currentUser+"_"+currentClass;
  await setDoc(doc(db,"scores",id),{
    nama:currentUser,
    kelas:currentClass,
    nilai:score,
    bab: bab.value
  });
}

</script>

</body>
</html>
