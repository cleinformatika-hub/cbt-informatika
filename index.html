<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBT Informatika SMP</title>

<style>
body{font-family:'Segoe UI',sans-serif;margin:0;background:linear-gradient(135deg,#dfe9f3,#ffffff)}
header{background:linear-gradient(135deg,#1abc9c,#3498db);color:#fff;padding:25px;text-align:center}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:#fff;border-radius:18px;padding:20px;margin-bottom:20px;box-shadow:0 10px 25px rgba(0,0,0,0.1)}
input,select,textarea{width:100%;padding:12px;margin:8px 0;border-radius:10px;border:1px solid #ddd}
button{width:100%;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,#3498db,#2980b9);color:white;font-size:15px}
.hidden{display:none}
</style>
</head>
<body>

<header>
<h1>📘 Informatika SMP</h1>
<p>Platform Belajar & Ujian Digital</p>
<p>👨‍🏫 Guru: <b>Pak Clement</b></p>
</header>

<div class="container">

<!-- LOGIN SISWA -->
<div class="card" id="loginPage">
<h3>Login Siswa</h3>
<input id="nama" placeholder="Nama">
<input id="kelas" placeholder="Kelas (contoh: 7A)">
<select id="tingkat">
<option value="7">Kelas 7</option>
<option value="8">Kelas 8</option>
<option value="9">Kelas 9</option>
</select>
<select id="mode">
<option value="belajar">📚 Belajar</option>
<option value="ujian">🧠 Ujian</option>
</select>
<button onclick="loginSiswa()">Masuk</button>
<p id="status"></p>
</div>

<!-- LOGIN GURU -->
<div class="card" id="guruLogin">
<h3>👨‍🏫 Login Guru</h3>
<input id="password" type="password" placeholder="Password Guru">
<button onclick="loginGuru()">Masuk Guru</button>
</div>

<!-- DASHBOARD GURU -->
<div class="card hidden" id="guruPage">
<h3>Dashboard Guru</h3>
<textarea id="importSiswa" placeholder="Budi,7A\nSiti,7A"></textarea>
<button onclick="importSiswaData()">Import Siswa</button>
<button onclick="logoutGuru()">Logout</button>
</div>

<!-- PILIH BAB -->
<div class="card hidden" id="babPage">
<h3>Pilih Bab</h3>
<select id="bab">
<option value="dasar">Bab Dasar</option>
<option value="internet">Bab Internet</option>
</select>
<input id="kode" placeholder="Kode Ujian" class="hidden">
<button onclick="lanjut()">Lanjut</button>
</div>

<!-- DASHBOARD SISWA -->
<div class="card hidden" id="menuPage">
<h3>Dashboard</h3>
<button onclick="openMateri()">📚 Materi</button>
<button onclick="openUjian()">🧠 Ujian</button>
</div>

<!-- MATERI -->
<div class="card hidden" id="materiPage">
<h3>Materi</h3>
<div id="materi"></div>
<button onclick="backMenu()">Kembali</button>
</div>

<!-- UJIAN -->
<div class="card hidden" id="ujianPage">
<h3>Ujian</h3>
<p id="question"></p>
<div id="options"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyALiyuf_F6wXjt3zhqWWEcG_mlgZrqsFvE",
projectId:"informatika-smp-67234"
});

const db = getFirestore(app);

let level="",modeUser="";

// LOGIN SISWA
window.loginSiswa = async ()=>{
const snap = await getDocs(collection(db,"students"));
let ok=false;
snap.forEach(d=>{
const s=d.data();
if(s.nama===nama.value && s.kelas===kelas.value) ok=true;
});

if(!ok){status.innerText="Tidak terdaftar";return}

level=tingkat.value;
modeUser=mode.value;

loginPage.classList.add("hidden");
babPage.classList.remove("hidden");

if(modeUser==="ujian") kode.classList.remove("hidden");
}

// LOGIN GURU (FIX)
window.loginGuru = ()=>{
const pass=document.getElementById("password").value.trim();

if(pass==="guru123!"){
alert("Login guru berhasil");
loginPage.classList.add("hidden");
guruLogin.classList.add("hidden");
guruPage.classList.remove("hidden");
}else{
alert("Password salah");
}
}

// IMPORT SISWA
window.importSiswaData = async ()=>{
const lines=importSiswa.value.split("\n");
for(let l of lines){
const [n,k]=l.split(",");
if(n&&k){
await addDoc(collection(db,"students"),{nama:n.trim(),kelas:k.trim()});
}
}
alert("Berhasil import");
}

// LOGOUT GURU
window.logoutGuru=()=>{
guruPage.classList.add("hidden");
guruLogin.classList.remove("hidden");
loginPage.classList.remove("hidden");
}

// LANJUT
window.lanjut=()=>{
if(modeUser==="ujian" && kode.value!=="K263"){
alert("Kode salah");return;
}

babPage.classList.add("hidden");
menuPage.classList.remove("hidden");
}

// MATERI
window.openMateri=async()=>{
menuPage.classList.add("hidden");
materiPage.classList.remove("hidden");

const snap=await getDocs(collection(db,"materi"));
snap.forEach(d=>{
const m=d.data();
if(m.kelas.startsWith(level)) materi.innerText=m.isi;
});
}

// UJIAN
window.openUjian=async()=>{
menuPage.classList.add("hidden");
ujianPage.classList.remove("hidden");

const snap=await getDocs(collection(db,"questions"));
let q=[];
snap.forEach(d=>{
const data=d.data();
if(data.kelas.startsWith(level)) q.push(data);
});

let i=0;
function show(){
if(i>=q.length){question.innerText="Selesai";return}
question.innerText=q[i].q;
options.innerHTML="";
q[i].options.forEach(o=>{
const b=document.createElement("button");
b.innerText=o;
b.onclick=()=>{i++;show()};
options.appendChild(b);
});
}
show();
}

window.backMenu=()=>{
materiPage.classList.add("hidden");
menuPage.classList.remove("hidden");
}

</script>

</body>
</html>
