<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Informatika SMP - App Style</title>
<style>
body{font-family:'Segoe UI';margin:0;background:#eef2f7}
header{background:linear-gradient(135deg,#1abc9c,#3498db);color:#fff;padding:20px;text-align:center}
.container{max-width:900px;margin:auto;padding:15px}
.card{background:#fff;border-radius:16px;padding:20px;margin-bottom:15px;box-shadow:0 6px 18px rgba(0,0,0,0.08)}
input,select{width:100%;padding:12px;margin:6px 0;border-radius:10px;border:1px solid #ddd}
button{width:100%;padding:12px;border:none;border-radius:10px;background:#3498db;color:#fff}
</style>
</head>
<body>

<header>
<h1>📘 Informatika SMP</h1>
<p>Belajar & Berlatih</p>
</header>

<div class="container">

<!-- HALAMAN LOGIN -->
<div class="card" id="loginPage">
<h3>Login Siswa</h3>
<input id="nama" placeholder="Nama">
<input id="kelas" placeholder="Kelas (contoh: 7A)">
<select id="tingkat">
<option value="7">Kelas 7</option>
<option value="8">Kelas 8</option>
<option value="9">Kelas 9</option>
</select>
<select id="mode">
<option value="belajar">📚 Belajar</option>
<option value="ujian">🧠 Ujian</option>
</select>
<button onclick="login()">Masuk</button>
<p id="status"></p>
</div>

<!-- HALAMAN PILIH BAB -->
<div class="card" id="babPage" style="display:none">
<h3>Pilih Bab</h3>
<select id="bab">
<option value="dasar">Bab Dasar</option>
<option value="internet">Bab Internet</option>
</select>
<input id="kode" placeholder="Kode (khusus ujian)" style="display:none">
<button onclick="lanjut()">Lanjut</button>
</div>

<!-- HALAMAN MATERI -->
<div class="card" id="materiPage" style="display:none">
<h3>Materi</h3>
<div id="materi"></div>
<div id="video"></div>
<button onclick="back()">⬅ Kembali</button>
</div>

<!-- HALAMAN UJIAN -->
<div class="card" id="ujianPage" style="display:none">
<h3>⏱️ <span id="timer">0</span></h3>
<p id="question"></p>
<div id="options"></div>
<p id="result"></p>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyALiyuf_F6wXjt3zhqWWEcG_mlgZrqsFvE",
authDomain:"informatika-smp-67234.firebaseapp.com",
projectId:"informatika-smp-67234"};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let modeUser="", level="";

function getDailyCode(){const d=new Date();return "K"+d.getDate()+(d.getMonth()+1)}

window.login=async()=>{
const snap=await getDocs(collection(db,"students"));
let ok=false;
snap.forEach(doc=>{
const s=doc.data();
if(s.nama===nama.value && s.kelas===kelas.value) ok=true;
});

if(!ok){status.innerText="Tidak terdaftar";return}

modeUser=mode.value;
level=tingkat.value;

loginPage.style.display="none";
babPage.style.display="block";

if(modeUser==="ujian"){
kode.style.display="block";
}
}

window.lanjut=async()=>{
if(modeUser==="ujian" && kode.value!==getDailyCode()){
alert("Kode salah");return;
}

babPage.style.display="none";

if(modeUser==="belajar"){
materiPage.style.display="block";
loadMateri();
}else{
ujianPage.style.display="block";
startQuiz();
}
}

async function loadMateri(){
const snap=await getDocs(collection(db,"materi"));
snap.forEach(doc=>{
const d=doc.data();
if(d.bab===bab.value && d.kelas.startsWith(level)){
materi.innerText=d.isi;
if(d.video) video.innerHTML=`<iframe width='100%' height='200' src='${d.video}'></iframe>`;
}
});
}

let questions=[],current=0;

async function startQuiz(){
const snap=await getDocs(collection(db,"questions"));
questions=[];
snap.forEach(doc=>{
const q=doc.data();
if(q.bab===bab.value && q.kelas.startsWith(level)) questions.push(q);
});
questions.sort(()=>Math.random()-0.5);
showQuestion();
}

function showQuestion(){
if(current>=questions.length){question.innerText="Selesai";return}
const q=questions[current];
question.innerText=q.q;
options.innerHTML="";
q.options.forEach((o,i)=>{
const b=document.createElement("button");
b.innerText=o;
b.onclick=()=>{current++;showQuestion()};
options.appendChild(b);
});
}

window.back=()=>{
materiPage.style.display="none";
babPage.style.display="block";
}

</script>

</body>
</html>
