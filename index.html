<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBT Informatika SMP</title>

<style>
body{
  font-family:'Segoe UI',sans-serif;
  margin:0;
  background:linear-gradient(135deg,#dfe9f3,#ffffff);
}
header{
  background:linear-gradient(135deg,#1abc9c,#3498db);
  color:#fff;
  padding:25px;
  text-align:center;
}
.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}
.card{
  background:#fff;
  border-radius:18px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  animation:fadeIn 0.4s ease;
}
input,select{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #ddd;
}
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#3498db,#2980b9);
  color:white;
  font-size:15px;
  cursor:pointer;
}
button:hover{opacity:0.9}

.hidden{display:none}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

.menu-btn{
  margin:10px 0;
  font-size:16px;
}

</style>
</head>
<body>

<header>
<h1>📘 Informatika SMP</h1>
<p>Platform Belajar & Ujian Digital</p>
<p>👨‍🏫 Guru: <b>Pak Clement</b></p>
</header>

<div class="container">

<!-- HALAMAN LOGIN -->
<div class="card" id="loginPage">
<h3>Login Siswa</h3>
<input id="nama" placeholder="Nama">
<input id="kelas" placeholder="Kelas (contoh: 7A)">
<select id="tingkat">
<option value="7">Kelas 7</option>
<option value="8">Kelas 8</option>
<option value="9">Kelas 9</option>
</select>
<select id="mode">
<option value="belajar">📚 Belajar</option>
<option value="ujian">🧠 Ujian</option>
</select>
<button onclick="login()">Masuk</button>
<p id="status"></p>
</div>

<!-- HALAMAN PILIH BAB -->
<div class="card hidden" id="babPage">
<h3>Pilih Bab</h3>
<select id="bab">
<option value="dasar">Bab Dasar</option>
<option value="internet">Bab Internet</option>
</select>
<input id="kode" placeholder="Kode Ujian" class="hidden">
<button onclick="lanjut()">Lanjut</button>
</div>

<!-- HALAMAN DASHBOARD -->
<div class="card hidden" id="menuPage">
<h3>Dashboard</h3>
<button class="menu-btn" onclick="openMateri()">📚 Buka Materi</button>
<button class="menu-btn" onclick="openUjian()">🧠 Mulai Ujian</button>
</div>

<!-- MATERI -->
<div class="card hidden" id="materiPage">
<h3>Materi</h3>
<div id="materi"></div>
<div id="video"></div>
<button onclick="backMenu()">⬅ Kembali</button>
</div>

<!-- UJIAN -->
<div class="card hidden" id="ujianPage">
<h3>⏱️ <span id="timer">0</span></h3>
<p id="question"></p>
<div id="options"></div>
<p id="result"></p>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyALiyuf_F6wXjt3zhqWWEcG_mlgZrqsFvE",
authDomain:"informatika-smp-67234.firebaseapp.com",
projectId:"informatika-smp-67234"};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let modeUser="", level="";

function getDailyCode(){const d=new Date();return "K"+d.getDate()+(d.getMonth()+1)}

// LOGIN
window.login=async()=>{
const snap=await getDocs(collection(db,"students"));
let ok=false;
snap.forEach(doc=>{
const s=doc.data();
if(s.nama===nama.value && s.kelas===kelas.value) ok=true;
});

if(!ok){status.innerText="Tidak terdaftar";return}

modeUser=mode.value;
level=tingkat.value;

loginPage.classList.add("hidden");
babPage.classList.remove("hidden");

if(modeUser==="ujian"){
kode.classList.remove("hidden");
}
}

// LANJUT KE DASHBOARD
window.lanjut=()=>{
if(modeUser==="ujian" && kode.value!==getDailyCode()){
alert("Kode salah");return;
}

babPage.classList.add("hidden");
menuPage.classList.remove("hidden");
}

// MATERI
window.openMateri=async()=>{
menuPage.classList.add("hidden");
materiPage.classList.remove("hidden");

const snap=await getDocs(collection(db,"materi"));
snap.forEach(doc=>{
const d=doc.data();
if(d.bab===bab.value && d.kelas.startsWith(level)){
materi.innerText=d.isi;
if(d.video) video.innerHTML=`<iframe width='100%' height='200' src='${d.video}'></iframe>`;
}
});
}

// UJIAN
window.openUjian=async()=>{
menuPage.classList.add("hidden");
ujianPage.classList.remove("hidden");

const snap=await getDocs(collection(db,"questions"));
let questions=[];

snap.forEach(doc=>{
const q=doc.data();
if(q.bab===bab.value && q.kelas.startsWith(level)){
questions.push(q);
}
});

questions.sort(()=>Math.random()-0.5);

let current=0;

function show(){
if(current>=questions.length){question.innerText="Selesai";return}
const q=questions[current];
question.innerText=q.q;
options.innerHTML="";
q.options.forEach((o,i)=>{
const b=document.createElement("button");
b.innerText=o;
b.onclick=()=>{current++;show()};
options.appendChild(b);
});
}

show();
}

window.backMenu=()=>{
materiPage.classList.add("hidden");
menuPage.classList.remove("hidden");
}

</script>

</body>
</html>
